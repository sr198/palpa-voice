<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Palpa Voice POC</title>
    <style>
      :root { color-scheme: dark; }
      body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; background: #0b1020; color: #e8ecf3; }
      header { padding: 16px 20px; border-bottom: 1px solid #29304a; }
      main { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; padding: 16px; }
      section { background: #121a2d; border: 1px solid #29304a; border-radius: 12px; padding: 14px; min-height: 70vh; }
      h1, h2, h3, p { margin: 0 0 12px; }
      .muted { color: #9aa5bd; }
      .composer { display: flex; gap: 8px; margin-top: 12px; }
      textarea { width: 100%; min-height: 90px; background: #0b1020; color: #fff; border: 1px solid #3a4365; border-radius: 8px; padding: 10px; }
      button { background: #7c8cff; color: #09101f; border: 0; border-radius: 8px; padding: 9px 12px; font-weight: 700; cursor: pointer; }
      button.secondary { background: #27304a; color: #e8ecf3; }
      ul { list-style: none; padding: 0; margin: 0; }
      li, pre { background: #0d1425; border: 1px solid #24304d; border-radius: 8px; padding: 10px; margin-bottom: 10px; overflow: auto; }
      .row { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
      .badge { display: inline-block; font-size: 12px; padding: 3px 8px; border-radius: 999px; background: #24304d; color: #b8c2d8; }
      .actions { display: flex; gap: 8px; margin-top: 8px; }
      .small { font-size: 12px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Palpa Voice POC — Stage 0 + 1</h1>
      <p class="muted">Lean proof: text event → curator → patch validator → live session object</p>
    </header>
    <main>
      <section>
        <h2>Live Conversation</h2>
        <p class="muted">Use text now; it already matches the future transcript event shape.</p>
        <div class="composer">
          <textarea id="message" placeholder="Say something like: We need voice-first collaboration and should keep the contracts lean."></textarea>
        </div>
        <div class="actions">
          <button id="send">Send transcript.final</button>
        </div>
        <h3 style="margin-top:16px">Transcript</h3>
        <ul id="transcript"></ul>
      </section>
      <section>
        <h2>Curated Session Object</h2>
        <div id="session"></div>
      </section>
      <section>
        <h2>Patch Feed</h2>
        <div id="pending"></div>
        <h3 style="margin-top:16px">Audit Log</h3>
        <ul id="audit"></ul>
      </section>
    </main>
    <script>
      const $ = (id) => document.getElementById(id);
      const state = { session: null, pendingPatches: [] };

      async function post(url, body) {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        return res.json();
      }

      function render() {
        if (!state.session) return;
        $('transcript').innerHTML = state.session.transcript.full.slice().reverse().map((item) => `
          <li>
            <div class="row"><strong>${item.speaker}</strong><span class="small muted">${new Date(item.timestamp).toLocaleTimeString()}</span></div>
            <div>${item.text}</div>
          </li>
        `).join('');

        const s = state.session;
        $('session').innerHTML = `
          <pre>${JSON.stringify({
            id: s.id,
            version: s.version,
            activeTopic: s.conversationState.activeTopic,
            rollingSummary: s.conversationState.rollingSummary,
            usefulContextSummary: s.conversationState.usefulContextSummary,
            decisions: s.outputs.decisions,
            openQuestions: s.outputs.openQuestions,
            risks: s.outputs.risks
          }, null, 2)}</pre>
        `;

        $('pending').innerHTML = state.pendingPatches.length ? state.pendingPatches.map((patch) => `
          <li>
            <div class="row"><strong>${patch.id}</strong><span class="badge">${patch.status}</span></div>
            <div class="small muted">${patch.reason}</div>
            <pre>${JSON.stringify(patch.operations, null, 2)}</pre>
            <div class="actions">
              <button onclick="reviewPatch('${patch.id}','approve')">Approve</button>
              <button class="secondary" onclick="reviewPatch('${patch.id}','reject')">Reject</button>
            </div>
          </li>
        `).join('') : '<p class="muted">No pending patches.</p>';

        $('audit').innerHTML = s.audit.patchLog.map((item) => `
          <li>
            <div class="row"><strong>${item.id}</strong><span class="badge">${item.status}</span></div>
            <div class="small muted">${item.type}</div>
            <div>${item.reason}</div>
          </li>
        `).join('');
      }

      async function reviewPatch(id, decision) {
        await post(`/api/patches/${id}/review`, { decision });
      }
      window.reviewPatch = reviewPatch;

      $('send').addEventListener('click', async () => {
        const text = $('message').value.trim();
        if (!text) return;
        await post('/api/messages', { speaker: 'You', text });
        $('message').value = '';
      });

      const es = new EventSource('/api/events');
      es.onmessage = (event) => {
        const data = JSON.parse(event.data);
        state.session = data.session;
        state.pendingPatches = data.pendingPatches;
        render();
      };
    </script>
  </body>
</html>
